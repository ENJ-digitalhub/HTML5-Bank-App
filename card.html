<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="stylesheet" href="/css/root.css">
    <link rel="stylesheet" href="/css/card.css">
    <link rel="shortcut icon" href="/media/img/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_outward" />
</head>

<body>
    <header>
        <h3>PayWare</h3>
        <img src="/media/img/default.png" alt="profile">
    </header>
    <main>
        <nav>
            <h5>Main</h5>
            <p><i class="fa-solid fa-diamond"></i> Dasboard</p>
            <p><span class="material-symbols-outlined">arrow_outward</span> Transfer</p>
            <p><i class="fa-solid fa-clock-rotate-left"></i> History</p>
            <p><i class="fa-solid fa-credit-card"></i> Cards</p>
            <p><i class="fa-solid fa-gear"></i> Profile</p>
            <p><i class="fa-solid fa-arrow-left"></i> Sign Out</p>
        </nav>
        <section>
            <div class="title">
                <h5>Cards</h5>
            </div>
            <div class="details">
                <div class="card">
                    <p class="number">234 **** **** **** 5678</p>
                    <div>
                        <p class="date">Expires End: **/**</p>
                        <p class="cvv">CVV: ***</p>
                    </div>
                </div>
                <div>
                    <button>Freeze Card</button>
                    <button>Request New Card</button>
                    <button>View Details</button>
                </div>
            </div>
            <div class="recent">
                <h2>Recent Transactions</h2>
                <hr>
                <div class="transaction">
                    <div class="tcontent">
                        <div>
                            <h4>Amazon</h4>
                            <p>28 Mar, 2026 06:45 PM</p>
                        </div>
                        <p class="amount">- $150.00</p>
                    </div>
                    <hr>
                    <div class="tcontent">
                        <div>
                            <h4>Amazon</h4>
                            <p>30 Jan, 2026 02:30 PM</p>
                        </div>
                        <p class="amount">- $150.00</p>
                    </div>
                    <hr>
                </div>
        </section>
    </main>
</body>

</html>
