<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="/css/root.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="shortcut icon" href="/media/img/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_outward" />
</head>

<body>
    <header>
        <h3>PayWare</h3>
        <img src="/media/img/FB_IMG_1738065673948.jpg.jpeg" alt="profile">
    </header>
    <main>
        <nav>
            <h5>Main</h5>
            <p><i class="fa-solid fa-diamond"></i> Dasboard</p>
            <p><span class="material-symbols-outlined">arrow_outward</span> Transfer</p>
            <p><i class="fa-solid fa-clock-rotate-left"></i> History</p>
            <p><i class="fa-solid fa-credit-card"></i> Cards</p>
            <p><i class="fa-solid fa-gear"></i> Profile</p>
            <p><i class="fa-solid fa-arrow-left"></i> Sign Out</p>
        </nav>
        <section>
            <div class="title">
                <h5>OVERVIEW</h5>
            </div>
            <div class="dashboard">
                <div class="circle"></div>
                <div class="balance">
                    <p>ACCOUNT BALANCE</p>
                    <p><span class="currency">$</span><span class="amount">12,480</span><span class="decimal">.00</span></p>
                    <p>Acct: XXX XXX 4953    |    NGN</p>
                </div>
                <div>
                    <button><i class="fa-solid fa-arrow-trend-up"></i><div class="icon"></div>SEND MONEY</button>
                    <button><i class="fa-solid fa-arrow-trend-down"></i><div class="icon"></div>REQUEST</button>
                    <button><i class="fa-solid fa-plus"></i><div class="icon"></div>ADD MONEY</button>
                </div>
            </div>
            <div class="dashboard2">
                <div>
                    <p>SPENT THIS MONTH</p>
                    <P class="amt amt1">$3,240</P>
                </div>
                <div>
                    <p>SAVINGS</p>
                    <P class="amt amt2">$5,500</P>
                </div>
                <div class="pending">
                    <p>PENDING</p>
                    <P class="amt amt3">$120</P>
                </div>
            </div>
            <div class="recent">
                <div class="header">
                    <h2>Recent Transactions</h2>
                    <p>view all <i class="fa-solid fa-arrow-right"></i></p>
                </div>
                <hr>
                <div class="transaction">
                    <div class="tcontent">
                        <div>
                            <div class="icon">
                                <i class="fa-solid fa-shopping-cart"></i>
                            </div>
                            <div class="label">
                                <h4>Amazon</h4>
                                <p>28 Mar, 2026 06:45 PM</p>
                            </div>
                        </div>
                        <div class="details">
                            <p class="amount">- $150.00</p>
                            <p class="status">Succesful</p>
                        </div>
                    </div>
                    <hr>
                </div>
        </section>
    </main>
</body>

</html>
